<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Bucketlist Staycations</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f9faf5;
      color: #1a2008;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #fff;
      border: 1px solid #d4e0a8;
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(61,74,30,0.15);
      max-width: 420px;
      width: 100%;
      padding: 2rem;
    }
    h1 { color: #5a6e2a; font-size: 1.5rem; margin-bottom: 0.5rem; }
    p.sub { color: #7a8c50; font-size: 0.92rem; margin-bottom: 1.5rem; line-height: 1.5; }
    label { display: block; font-size: 0.85rem; color: #4a5a25; margin-bottom: 0.35rem; }
    input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1px solid #d4e0a8;
      border-radius: 8px;
      background: #f4f7ec;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    input:focus { outline: 2px solid #a8c060; border-color: #7a9b35; }
    button {
      width: 100%;
      background: #7a9b35;
      color: #fff;
      border: none;
      padding: 0.8rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { font-size: 0.9rem; margin-bottom: 1rem; line-height: 1.5; }
    .msg.error { color: #c0392b; }
    .msg.success { color: #276749; }
    a.back { display: inline-block; margin-top: 1rem; color: #7a9b35; font-size: 0.9rem; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🏡 Reset Password</h1>
    <p class="sub" id="subtitle">Choose a new password for your account.</p>
    <p class="msg" id="message"></p>

    <form id="resetForm">
      <label for="password">New password</label>
      <input type="password" id="password" placeholder="Min 6 characters" required />
      <label for="confirm">Confirm new password</label>
      <input type="password" id="confirm" placeholder="Re-enter password" required />
      <button type="submit" id="submitBtn">Update Password</button>
    </form>

    <a class="back" id="backLink" href="index.html">← Back to site</a>
  </div>

  <script>
    const API_URL = 'https://bucketlist-backend-jx24.onrender.com';

    // Supabase returns the tokens in the URL hash fragment after the email redirect
    const hash = new URLSearchParams(window.location.hash.substring(1));
    const access_token  = hash.get('access_token');
    const refresh_token = hash.get('refresh_token');
    const errorDesc     = hash.get('error_description');

    const form    = document.getElementById('resetForm');
    const msg     = document.getElementById('message');
    const btn     = document.getElementById('submitBtn');
    const subtitle = document.getElementById('subtitle');

    function showMessage(text, type) {
      msg.textContent = text;
      msg.className = 'msg ' + (type || '');
    }

    // If the link is invalid/expired or has no token, hide the form
    if (errorDesc || !access_token) {
      form.style.display = 'none';
      subtitle.style.display = 'none';
      showMessage(
        errorDesc
          ? 'This reset link is invalid or has expired. Please request a new one from the login screen.'
          : 'No reset token found. Please use the link from your password-reset email.',
        'error'
      );
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (password.length < 6) { showMessage('Password must be at least 6 characters.', 'error'); return; }
      if (password !== confirm) { showMessage('Passwords do not match.', 'error'); return; }

      btn.textContent = 'Updating...';
      btn.disabled = true;
      showMessage('', '');

      try {
        const res = await fetch(`${API_URL}/api/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ access_token, refresh_token, password })
        });
        const data = await res.json();

        if (!res.ok) {
          showMessage(data.error || 'Could not reset password. Please request a new link.', 'error');
          btn.textContent = 'Update Password';
          btn.disabled = false;
          return;
        }

        form.style.display = 'none';
        subtitle.style.display = 'none';
        showMessage('✅ Password updated! You can now log in with your new password.', 'success');
      } catch (err) {
        showMessage('Connection error. Please try again.', 'error');
        btn.textContent = 'Update Password';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
